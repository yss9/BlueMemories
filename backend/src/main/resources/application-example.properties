spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/bluememories?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://your-domain.com}
jwt.secret=${JWT_SECRET:replace-with-at-least-sixty-four-bytes-random-secret-value}
jwt.expiration-millis=${JWT_EXPIRATION_MILLIS:36000000}

cloud.aws.credentials.access-key=${AWS_ACCESS_KEY:}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY:}
cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
cloud.aws.s3.bucket=${AWS_S3_BUCKET:}

ai.provider=${AI_PROVIDER:ollama}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:qwen2.5:14b}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
gpt_api.key=${OPENAI_API_KEY:}
youtube_api.key=${YOUTUBE_API_KEY:}
